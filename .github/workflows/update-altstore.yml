name: Update AltStore source

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}       # manual "Run workflow" button
  release:
    types: [published]        # instant update when a new release drops
                              # (only fires for releases in THIS repo)

permissions:
  contents: write

concurrency:
  group: update-altstore
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate apps.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_source.py

      - name: Validate JSON
        run: python3 -c "import json; json.load(open('apps.json')); print('apps.json is valid JSON')"

      - name: Commit if changed
        run: |
          if git diff --quiet -- apps.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git commit -m "chore: update AltStore source $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
